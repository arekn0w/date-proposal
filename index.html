<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For OPIEEEEE ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,body{
    width:100%;
    height:100%;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
    padding:20px;
}

/* BACKGROUND */

.bg-circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.4;
}

.circle1{
    width:300px;
    height:300px;
    background:white;
    top:-100px;
    left:-80px;
}

.circle2{
    width:350px;
    height:350px;
    background:#ffb6d9;
    right:-100px;
    bottom:-100px;
}

/* HEARTS */

.heart{
    position:absolute;
    bottom:-50px;
    pointer-events:none;
    animation:floatHeart linear forwards;
}

@keyframes floatHeart{
    0%{transform:translateY(0) scale(.8);opacity:0;}
    15%{opacity:1;}
    100%{transform:translateY(-120vh) scale(1.4);opacity:0;}
}

/* CARD */

.container{
    width:min(92%,800px);
    padding:45px;
    text-align:center;
    color:white;
    border-radius:32px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 30px 80px rgba(0,0,0,.2);
    position:relative;
}

/* TEXT */

h1{
    font-size:clamp(2rem,4vw,3rem);
    margin-bottom:10px;
}

.subtitle{
    margin-bottom:30px;
}

/* BUTTON AREA (IMPORTANT) */

.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    position:relative;
    min-height:120px;
}

/* BUTTONS */

button{
    border:none;
    cursor:pointer;
    border-radius:999px;
    font-weight:600;
    padding:15px 40px;
    transition:all .4s cubic-bezier(.22,1,.36,1);
}

/* YES BUTTON (ON TOP ALWAYS) */

#yesBtn{
    background:white;
    color:#ff4f81;
    z-index:2;
    position:relative;
}

/* NO BUTTON (BEHIND YES) */

#noBtn{
    background:#ff4f81;
    color:white;
    z-index:1;
    position:relative;
}

/* LETTER */

.love-letter{
    margin-top:20px;
    text-align:left;
    padding:20px;
    background:rgba(255,255,255,.12);
    border-radius:16px;
}

/* MOBILE */

@media(max-width:480px){

    .container{
        padding:20px;
    }

    .buttons{
        height:180px;
    }

    button{
        padding:12px 28px;
        font-size:.9rem;
    }
}

</style>
</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainCard">

    <h1>Hey OPIEEEEE 🤭</h1>

    <p class="subtitle">Would you like to go on a date with me? 🥺</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😢</button>
    </div>

</div>

<script>

/* MUSIC */
const bgMusic = document.getElementById("bgMusic");
let musicStarted = false;

function startMusic(){
    if(musicStarted) return;
    musicStarted = true;

    bgMusic.volume = 0;
    bgMusic.play().catch(()=>{});

    let v = 0;
    const fade = setInterval(()=>{
        v += 0.05;
        bgMusic.volume = Math.min(v,1);
        if(v>=1) clearInterval(fade);
    },120);
}

document.addEventListener("click",startMusic,{once:true});

/* HEARTS */
function createHeart(){
    const h = document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*18+16)+"px";
    h.style.animationDuration=(Math.random()*4+5)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),9000);
}
setInterval(createHeart,250);

/* BUTTON LOGIC */

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const subtitle = document.querySelector(".subtitle");

let yesScale = 1;
let noScale = 1;
let clickCount = 0;

const messages = [
    "Are you sure? 🥺",
    "Really sure? 😏",
    "Think again 😘",
    "You're breaking my heart 💔",
    "Pretty please 🥹",
    "I'll bring food 🍔",
    "Just say YES already 😭",
    "Come onnnn ❤️",
    "You know you want to 😏"
];

function update(){

    yesBtn.style.transform =
        `scale(${yesScale})`;

    noBtn.style.transform =
        `scale(${noScale})`;

    yesBtn.style.zIndex = "10";
    noBtn.style.zIndex = "1";

    if(clickCount >= 5){
        noBtn.style.marginLeft = `-${(clickCount-4)*20}px`;
    }
}

noBtn.addEventListener("click",()=>{

    clickCount++;

    yesScale += 0.15;;

    if(noScale > 0.7){
        noScale -= 0.05;
    }

    subtitle.innerHTML =
        messages[Math.min(clickCount, messages.length-1)];

    /* smooth pop animation */
    yesBtn.animate([
        {transform:`translate(-50%,-50%) scale(${yesScale-0.2})`},
        {transform:`translate(-50%,-50%) scale(${yesScale})`}
    ],{
        duration:400,
        easing:"cubic-bezier(.22,1,.36,1)"
    });

    update();
});

/* YES CLICK */
yesBtn.addEventListener("click",()=>{

    document.getElementById("mainCard").innerHTML=`
    <h1>OPIEEEEE Said YES YOOOHOOOO 🥰</h1>
    <p style="margin-top:15px;">You made my whole world happy 😭</p>
    <div class="love-letter">
        <h3>💌 A Letter</h3>
        <p>Thank you for saying yes OPIEEEE🥹.</p>
        <p>I will make this worth it, trust meee ❤️</p>
        <p>See you soon OPIEEEEEE😌</p>
    </div>
    `;
});

update();

</script>

</body>
</html>
