<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For OPIEEEEE ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,body{
    width:100%;
    height:100%;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    linear-gradient(
        135deg,
        #ff758c 0%,
        #ff7eb3 50%,
        #ffb199 100%
    );
    padding:20px;
}

/* BACKGROUND BLURS */

.bg-circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.4;
    animation:floatBlob 12s ease-in-out infinite;
}

.circle1{
    width:300px;
    height:300px;
    background:white;
    top:-100px;
    left:-80px;
}

.circle2{
    width:350px;
    height:350px;
    background:#ffb6d9;
    right:-100px;
    bottom:-100px;
    animation-delay:2s;
}

@keyframes floatBlob{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-30px);
    }
}

/* HEARTS */

.heart{
    position:absolute;
    bottom:-50px;
    pointer-events:none;
    animation:floatHeart linear forwards;
}

@keyframes floatHeart{
    0%{
        transform:
            translateY(0)
            translateX(0)
            scale(.8);
        opacity:0;
    }

    15%{
        opacity:1;
    }

    100%{
        transform:
            translateY(-120vh)
            translateX(50px)
            rotate(360deg)
            scale(1.4);

        opacity:0;
    }
}

/* CARD */

.container{
    width:min(92%,800px);

    padding:50px;

    text-align:center;
    color:white;

    border-radius:32px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.20),
        rgba(255,255,255,.08)
    );

    border:1px solid rgba(255,255,255,.20);

    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    box-shadow:
        0 30px 80px rgba(0,0,0,.20),
        inset 0 1px 1px rgba(255,255,255,.25);

    position:relative;
    overflow:hidden;

    animation:cardIn .9s cubic-bezier(.22,1,.36,1);

    z-index:5;
}

.container::before{
    content:"";

    position:absolute;
    inset:0;

    background:
    linear-gradient(
        120deg,
        transparent 25%,
        rgba(255,255,255,.12) 50%,
        transparent 75%
    );

    transform:translateX(-120%);
    animation:shine 8s linear infinite;
}

@keyframes shine{
    to{
        transform:translateX(120%);
    }
}

@keyframes cardIn{
    from{
        opacity:0;
        transform:
        translateY(30px)
        scale(.95);
    }
    to{
        opacity:1;
        transform:
        translateY(0)
        scale(1);
    }
}

h1{
    font-size:clamp(2rem,4vw,3.3rem);
    margin-bottom:15px;
}

.subtitle{
    font-size:1.1rem;
    opacity:.95;
    margin-bottom:35px;
    transition:.3s ease;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

button{
    border:none;
    cursor:pointer;

    min-width:140px;

    padding:15px 42px;

    border-radius:999px;

    font-size:1rem;
    font-weight:600;

    transition:
        transform .35s cubic-bezier(.22,1,.36,1),
        box-shadow .35s cubic-bezier(.22,1,.36,1);
}

button:active{
    transform:scale(.92);
}

#yesBtn{
    background:white;
    color:#ff4f81;

    box-shadow:
    0 15px 35px rgba(255,255,255,.25);

    transition:
        transform .45s cubic-bezier(.22,1,.36,1),
        box-shadow .45s cubic-bezier(.22,1,.36,1);
}

#yesBtn:hover{
    transform:translateY(-3px);
}

#noBtn{
    background:#ff4f81;
    color:white;

    box-shadow:
    0 15px 35px rgba(255,79,129,.30);

    transition:
        transform .45s cubic-bezier(.22,1,.36,1),
        box-shadow .45s cubic-bezier(.22,1,.36,1);
}

/* LETTER */

.love-letter{
    margin-top:25px;
    text-align:left;

    padding:25px;

    border-radius:20px;

    background:rgba(255,255,255,.12);

    line-height:1.9;
}

/* SUCCESS */

.success{
    animation:successIn .8s cubic-bezier(.22,1,.36,1);
}

@keyframes successIn{
    from{
        opacity:0;
        transform:
        translateY(30px)
        scale(.95);
    }
    to{
        opacity:1;
        transform:
        translateY(0)
        scale(1);
    }
}

@media(max-width:480px){

    .container{
        padding:25px;
    }

    .buttons{
        flex-direction:column;
    }

    button{
        width:100%;
    }

}
</style>
</head>
<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<audio id="bgMusic" loop>
    <source src="selfless.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainCard">

    <h1>Hey OPIEEEEE ❤️</h1>

    <p class="subtitle">
        Would you like to go on a date with me? 🥺❤️
    </p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😢</button>
    </div>

</div>

<script>

/* MUSIC */

const bgMusic = document.getElementById("bgMusic");

let musicStarted = false;

function startMusic(){

    if(musicStarted) return;

    musicStarted = true;

    bgMusic.volume = 0;

    bgMusic.play().catch(()=>{});

    let vol = 0;

    const fade = setInterval(()=>{

        vol += 0.05;

        bgMusic.volume = Math.min(vol,1);

        if(vol >= 1){
            clearInterval(fade);
        }

    },120);
}

document.addEventListener("click",startMusic,{once:true});
document.addEventListener("touchstart",startMusic,{once:true});

/* FLOATING HEARTS */

function createHeart(){

    const heart = document.createElement("div");

    heart.className = "heart";

    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize =
    (Math.random()*18 + 16) + "px";

    heart.style.animationDuration =
    (Math.random()*4 + 5) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },9000);
}

setInterval(createHeart,250);

/* BUTTONS */

/* BUTTONS */

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const subtitle = document.querySelector(".subtitle");

let yesScale = 1;
let noScale = 1;

const messages = [
    "Are you sure? 🥺",
    "Really sure? ❤️",
    "Think again 😘",
    "I promise it'll be fun 🌹",
    "Pretty please? 🥹",
    "I'll bring food 🍔",
    "You're too cute to say no 😍",
    "Just one date 💕",
    "Come onnnn ❤️",
    "You know you want to 😏",
    "The YES button looks good right? 👀",
    "Just click YES already 😂❤️"
];

let clickCount = 0;

function updateButtons(){

    yesBtn.style.transition =
        "all .45s cubic-bezier(.22,1,.36,1)";

    noBtn.style.transition =
        "all .45s cubic-bezier(.22,1,.36,1)";

    yesBtn.style.transform =
        `scale(${yesScale})`;

    noBtn.style.transform =
        `scale(${noScale})`;
}

noBtn.addEventListener("click", ()=>{

    clickCount++;

    yesScale += 0.18;

    if(noScale > 0.55){
        noScale -= 0.04;
    }

    subtitle.innerHTML =
        messages[
            Math.min(
                clickCount,
                messages.length - 1
            )
        ];
    yesBtn.animate(
        [
            {
                transform:`scale(${yesScale - 0.15})`
            },
            {
                transform:`scale(${yesScale})`
            }
        ],
        {
            duration:450,
            easing:"cubic-bezier(.22,1,.36,1)"
        });

    updateButtons();

});

/* INITIAL */
updateButtons();

/* CONFETTI */

function launchConfetti(){

    for(let i=0;i<200;i++){

        const c = document.createElement("div");

        c.style.position="fixed";
        c.style.left=Math.random()*100+"vw";
        c.style.top="-20px";

        c.style.width="10px";
        c.style.height="10px";

        c.style.borderRadius="50%";

        c.style.background=
        `hsl(${Math.random()*360},100%,60%)`;

        c.style.zIndex="9999";

        document.body.appendChild(c);

        c.animate(
        [
            {
                transform:
                "translateY(0) rotate(0deg)"
            },
            {
                transform:
                `translateY(${window.innerHeight+150}px)
                rotate(${Math.random()*720}deg)`
            }
        ],
        {
            duration:2500 + Math.random()*2500,
            easing:"cubic-bezier(.22,1,.36,1)"
        });

        setTimeout(()=>{
            c.remove();
        },5000);
    }
}

/* YES */

yesBtn.addEventListener("click",()=>{

    launchConfetti();

    document.getElementById("mainCard").innerHTML = `

    <div class="success">

        <h1>She Said Yes ❤️🥰</h1>

        <p style="margin-top:15px;font-size:1.15rem;">
            You just made my day, my week,
            and probably my whole year ❤️
        </p>

        <div class="love-letter">

            <h2>💌 A Letter For You</h2>

            <br>

            <p>Dear OPIEEEEE,</p>

            <p>
            Thank you for saying yes.
            </p>

            <p>
            I promise I'll do my best to make
            every moment special and memorable.
            </p>

            <p>
            Lots of laughs, good food,
            and beautiful memories await us.
            </p>

            <p>
            Trust meeee 😌❤️
            </p>

            <p>
            See you soon, beautiful.
            </p>

            <br>

            <p>
            ❤️
            </p>

        </div>

    </div>

    `;
});

</script>

</body>
</html>
